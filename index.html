<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI應用教學網頁管理 (簡單版本) V.1.1</title>
    <!-- 引入 Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 引入 FontAwesome 圖示 -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <!-- 引入 JSZip 用於全部打包下載 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    
    <!-- 設定清新自然、咖啡香風自訂顏色 -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        mocha: {
                            50: '#fdfbf7',  /* 燕麥奶白 */
                            100: '#f6f1e9', /* 淺卡其 */
                            200: '#eaddc8', /* 拿鐵色 */
                            300: '#dcb897',
                            400: '#ce946b',
                            500: '#b87349', /* 焦糖色 */
                            600: '#a35a39',
                            700: '#884632', /* 咖啡豆色 */
                            800: '#703a2c',
                            900: '#5b3226',
                        },
                        sage: {
                            50: '#f4f7f4',
                            100: '#e4ebe4',
                            200: '#cbdad1',
                            300: '#a6bfb0',
                            400: '#7e9e8c', /* 森綠色 */
                            500: '#608270',
                            600: '#4a6758',
                            700: '#3e5348',
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Helvetica Neue', Helvetica, Arial, 'Microsoft JhengHei', sans-serif; }
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #fdfbf7; border-radius: 4px; }
        ::-webkit-scrollbar-thumb { background: #eaddc8; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #dcb897; }
        .fade-in { animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        /* 載入中遮罩 */
        #loader { display: none; }
        body.loading #loader { display: flex; }
        /* 全螢幕時的 iframe 樣式 */
        #preview-frame:fullscreen { background-color: #fdfbf7; width: 100vw; height: 100vh; }
        
        /* 超出兩行顯示刪節號 */
        .line-clamp-2 {
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;  
            overflow: hidden;
        }
    </style>
</head>
<body class="bg-mocha-50 text-mocha-900 h-screen flex overflow-hidden selection:bg-mocha-200">

    <!-- 全局載入中遮罩 -->
    <div id="loader" class="fixed inset-0 bg-mocha-50/90 backdrop-blur-sm z-[999] flex-col items-center justify-center fade-in">
        <i class="fa-solid fa-mug-hot fa-bounce text-6xl text-mocha-500 mb-6"></i>
        <p class="text-lg font-medium text-mocha-800 tracking-widest" id="loader-text">萃取資料中...</p>
    </div>

    <!-- 左側分類導覽列 (清新自然風) -->
    <aside class="w-72 bg-white border-r border-mocha-100 flex flex-col shadow-[4px_0_24px_rgba(0,0,0,0.02)] z-10 relative">
        <div class="p-7 border-b border-mocha-100 flex items-center space-x-4 bg-mocha-50/80">
            <div class="bg-sage-500 text-white w-10 h-10 rounded-xl flex items-center justify-center shadow-sm">
                <i class="fa-solid fa-leaf text-lg"></i>
            </div>
            <div>
                <h1 class="text-xl font-bold text-mocha-800 tracking-wide leading-tight">AI應用教學</h1>
                <span class="text-xs font-medium text-sage-600 bg-sage-100 px-2 py-0.5 rounded-full mt-1 inline-block">(簡單版本) V.1.1</span>
            </div>
        </div>
        <div class="p-5 flex-1 overflow-y-auto space-y-1.5" id="category-list">
            <!-- 分類列表 -->
        </div>
        
        <!-- 左下角操作按鈕區 -->
        <div class="p-6 border-t border-mocha-100 space-y-3.5 bg-white">
            <button onclick="openModal('add')" class="w-full bg-mocha-600 hover:bg-mocha-700 text-white font-medium py-3 px-4 rounded-xl transition duration-300 shadow-sm flex items-center justify-center space-x-2">
                <i class="fa-solid fa-plus text-sm"></i>
                <span>新增網頁作品</span>
            </button>
            <button onclick="syncDrive()" class="w-full bg-mocha-50 hover:bg-mocha-100 text-mocha-700 font-medium py-2.5 px-4 rounded-xl transition duration-300 flex items-center justify-center space-x-2">
                <i class="fa-solid fa-rotate-right text-sm"></i>
                <span>重新載入</span>
            </button>
            <button onclick="downloadAllZip()" class="w-full bg-sage-50 hover:bg-sage-100 text-sage-700 font-medium py-2.5 px-4 rounded-xl transition duration-300 flex items-center justify-center space-x-2">
                <i class="fa-solid fa-box-archive text-sm"></i>
                <span>打包備份</span>
            </button>
            <button onclick="openSettings()" class="w-full text-mocha-400 hover:text-mocha-600 font-medium py-2 px-4 text-xs transition flex items-center justify-center mt-4">
                <i class="fa-solid fa-sliders mr-1.5"></i> 系統設定
            </button>
        </div>
    </aside>

    <!-- 右側主要內容區 -->
    <main class="flex-1 flex flex-col h-full overflow-hidden relative bg-mocha-50/50">
        <!-- 裝飾背景 -->
        <div class="absolute top-0 right-0 w-full h-64 bg-gradient-to-b from-white to-transparent opacity-80 pointer-events-none"></div>

        <header class="pt-10 pb-6 px-10 flex justify-between items-end z-0 relative">
            <div>
                <h2 class="text-3xl font-bold text-mocha-900 tracking-tight" id="current-category-title">書櫃總覽</h2>
                <div class="text-sm text-mocha-500 mt-2 font-medium flex items-center">
                    <i class="fa-solid fa-book-open text-mocha-400 mr-2"></i>
                    <span id="file-count">共 0 份文件</span>
                </div>
            </div>
        </header>

        <div class="flex-1 overflow-y-auto px-10 pb-10 z-0">
            <div class="grid grid-cols-1 lg:grid-cols-2 xl:grid-cols-3 2xl:grid-cols-4 gap-8" id="files-container">
            </div>
        </div>
    </main>

    <!-- 新增/修改 Modal (質感留白風格) -->
    <div id="file-modal" class="fixed inset-0 bg-mocha-900/40 backdrop-blur-sm hidden items-center justify-center z-50 fade-in">
        <div class="bg-white rounded-2xl shadow-2xl w-full max-w-4xl max-h-[90vh] flex flex-col overflow-hidden">
            <div class="p-7 border-b border-mocha-100 flex justify-between items-center">
                <h3 class="text-xl font-bold text-mocha-800 flex items-center"><i class="fa-solid fa-feather-pointed text-sage-500 mr-3"></i> <span id="modal-title">撰寫新網頁</span></h3>
                <button onclick="closeModal('file-modal')" class="text-mocha-400 hover:text-mocha-700 transition">
                    <i class="fa-solid fa-times text-xl"></i>
                </button>
            </div>
            <div class="p-8 flex-1 overflow-y-auto bg-mocha-50/30">
                <form id="file-form" class="space-y-6">
                    <input type="hidden" id="file-id">
                    
                    <div class="grid grid-cols-3 gap-6">
                        <div>
                            <label class="block text-sm font-bold text-mocha-700 mb-2">分類標籤</label>
                            <input type="text" id="file-category" placeholder="例如：教學" required class="w-full bg-white border border-mocha-200 rounded-lg p-3 outline-none focus:ring-2 focus:ring-sage-400 focus:border-sage-400 transition shadow-sm text-mocha-800">
                        </div>
                        <div>
                            <label class="block text-sm font-bold text-mocha-700 mb-2">網頁名稱</label>
                            <input type="text" id="file-name" placeholder="例如：首頁" required class="w-full bg-white border border-mocha-200 rounded-lg p-3 outline-none focus:ring-2 focus:ring-sage-400 focus:border-sage-400 transition shadow-sm text-mocha-800">
                        </div>
                        <div>
                            <label class="block text-sm font-bold text-mocha-700 mb-2">作者</label>
                            <input type="text" id="file-developer" placeholder="例如：王大明" required class="w-full bg-white border border-mocha-200 rounded-lg p-3 outline-none focus:ring-2 focus:ring-sage-400 focus:border-sage-400 transition shadow-sm text-mocha-800">
                        </div>
                    </div>

                    <div>
                        <label class="block text-sm font-bold text-mocha-700 mb-2">內容簡介</label>
                        <textarea id="file-description" rows="2" placeholder="寫下這份網頁的設計理念或用途..." class="w-full bg-white border border-mocha-200 rounded-lg p-3 outline-none focus:ring-2 focus:ring-sage-400 focus:border-sage-400 transition shadow-sm resize-none text-mocha-800"></textarea>
                    </div>
                    
                    <div class="text-xs font-medium text-mocha-500 flex items-center justify-end">
                        <i class="fa-solid fa-cloud-arrow-up mr-1.5"></i>
                        將儲存為：<span id="preview-filename" class="text-mocha-700 ml-1 font-mono bg-mocha-100 px-2 py-0.5 rounded">類別-網頁名稱-開發者.html</span>
                    </div>

                    <div>
                        <label class="block text-sm font-bold text-mocha-700 mb-2">HTML 原始碼</label>
                        <textarea id="file-content" required rows="10" placeholder="<!DOCTYPE html>..." class="w-full bg-slate-50 border border-mocha-200 rounded-lg p-4 font-mono text-sm outline-none focus:ring-2 focus:ring-sage-400 focus:border-sage-400 transition shadow-inner text-slate-700"></textarea>
                    </div>
                </form>
            </div>
            <div class="p-6 border-t border-mocha-100 flex justify-end space-x-4 bg-white">
                <button onclick="closeModal('file-modal')" class="px-6 py-2.5 text-mocha-600 bg-mocha-50 rounded-lg hover:bg-mocha-100 transition font-medium">取消</button>
                <button id="save-btn" onclick="saveFile()" class="px-6 py-2.5 text-white bg-sage-600 rounded-lg hover:bg-sage-700 transition font-medium shadow-sm flex items-center">
                    <i class="fa-solid fa-check mr-2"></i>確認儲存
                </button>
            </div>
        </div>
    </div>

    <!-- 執行/預覽 Modal -->
    <div id="preview-modal" class="fixed inset-0 bg-mocha-900/95 hidden flex-col z-[60] fade-in">
        <div class="flex justify-between items-center px-6 py-4 bg-transparent text-mocha-100">
            <h3 class="text-lg font-medium flex items-center truncate max-w-lg">
                <i class="fa-solid fa-desktop text-sage-400 mr-3"></i> 
                <span id="preview-title" class="tracking-wide">網頁預覽</span>
            </h3>
            
            <div class="flex items-center space-x-4">
                <button onclick="openInNewTab()" class="text-mocha-300 hover:text-white transition flex items-center px-3 py-1.5 rounded bg-mocha-800/50 hover:bg-mocha-700" title="在全新分頁獨立開啟">
                    <i class="fa-solid fa-arrow-up-right-from-square text-sm mr-2"></i>
                    <span class="text-sm font-medium">獨立視窗</span>
                </button>
                <button onclick="toggleFullScreen()" class="text-mocha-300 hover:text-white transition flex items-center px-3 py-1.5 rounded bg-mocha-800/50 hover:bg-mocha-700" title="全螢幕模式 (按 Esc 退出)">
                    <i class="fa-solid fa-expand text-sm mr-2"></i>
                    <span class="text-sm font-medium">全螢幕</span>
                </button>
                <div class="h-5 w-px bg-mocha-700 mx-2"></div>
                <button onclick="closeModal('preview-modal')" class="text-mocha-400 hover:text-red-400 transition w-8 h-8 flex items-center justify-center rounded-full hover:bg-mocha-800">
                    <i class="fa-solid fa-times text-xl"></i>
                </button>
            </div>
        </div>
        <div class="flex-1 bg-white relative rounded-t-2xl mx-2 shadow-2xl overflow-hidden">
            <iframe id="preview-frame" class="w-full h-full border-0 bg-white" sandbox="allow-scripts allow-same-origin allow-forms allow-popups"></iframe>
        </div>
    </div>

    <!-- 基本設定 Modal -->
    <div id="settings-modal" class="fixed inset-0 bg-mocha-900/40 backdrop-blur-sm hidden items-center justify-center z-[70] fade-in">
        <div class="bg-white rounded-2xl shadow-xl w-full max-w-sm flex flex-col overflow-hidden">
            <div class="p-6 border-b border-mocha-100 flex justify-between items-center">
                <h3 class="text-lg font-bold text-mocha-800 flex items-center"><i class="fa-solid fa-shield-halved text-sage-500 mr-2"></i>系統設定</h3>
                <button onclick="closeModal('settings-modal')" class="text-mocha-400 hover:text-mocha-600 transition"><i class="fa-solid fa-times"></i></button>
            </div>
            <div class="p-7 bg-mocha-50/30">
                <label class="block text-sm font-bold text-mocha-700 mb-2">Google Drive 資料夾 ID</label>
                <input type="text" id="setting-folder-id" class="w-full bg-white border border-mocha-200 rounded-lg p-3 outline-none focus:ring-2 focus:ring-sage-400 font-mono text-sm text-mocha-800 shadow-sm">
            </div>
            <div class="p-6 border-t border-mocha-100 flex justify-end">
                <button onclick="saveSettings()" class="w-full py-2.5 text-white bg-sage-600 rounded-lg hover:bg-sage-700 transition font-medium shadow-sm">套用設定</button>
            </div>
        </div>
    </div>

    <!-- 刪除確認 Modal -->
    <div id="delete-modal" class="fixed inset-0 bg-mocha-900/40 backdrop-blur-sm hidden items-center justify-center z-[70] fade-in">
        <div class="bg-white rounded-2xl shadow-xl w-full max-w-sm flex flex-col overflow-hidden">
            <div class="p-6 border-b border-mocha-100 flex justify-between items-center">
                <h3 class="text-lg font-bold text-red-700 flex items-center"><i class="fa-solid fa-triangle-exclamation mr-2"></i>捨棄檔案</h3>
                <button onclick="closeModal('delete-modal')" class="text-mocha-400 hover:text-mocha-600 transition"><i class="fa-solid fa-times"></i></button>
            </div>
            <div class="p-7 bg-red-50/30">
                <p class="text-sm text-mocha-700 mb-5 leading-relaxed" id="delete-modal-message">確定要刪除嗎？</p>
                <label class="block text-sm font-bold text-mocha-700 mb-2">請輸入授權密碼</label>
                <input type="password" id="delete-password" placeholder="••••••" class="w-full bg-white border border-red-200 rounded-lg p-3 outline-none focus:ring-2 focus:ring-red-400 font-mono text-sm shadow-sm">
                <input type="hidden" id="delete-file-id">
            </div>
            <div class="p-6 border-t border-mocha-100 flex justify-end space-x-3">
                <button onclick="closeModal('delete-modal')" class="px-5 py-2 text-mocha-600 bg-mocha-50 rounded-lg hover:bg-mocha-100 transition font-medium">保留</button>
                <button onclick="confirmDeleteAction()" class="px-5 py-2 text-white bg-red-600 rounded-lg hover:bg-red-700 transition font-medium shadow-sm">確認捨棄</button>
            </div>
        </div>
    </div>

    <!-- 訊息提示 (Toast) -->
    <div id="toast" class="fixed bottom-8 left-1/2 transform -translate-x-1/2 translate-y-24 opacity-0 transition-all duration-300 px-6 py-3.5 rounded-full shadow-[0_8px_30px_rgba(0,0,0,0.12)] z-[100] flex items-center space-x-3">
        <i id="toast-icon" class="fa-solid text-lg"></i>
        <span id="toast-message" class="font-medium tracking-wide">操作成功！</span>
    </div>

    <script>
        // ==========================================
        // Google Apps Script 正式部署網址
        // ==========================================
        const GAS_API_URL = "https://script.google.com/macros/s/AKfycbyR9A2BZDZM7mtG12iz6ra2zFZKO-YX4zU2GFsJ93xAN4e8nYTFarSlBTC3FK7tnkcM/exec";
        
        // 預設資料夾 ID
        const DEFAULT_FOLDER_ID = "155vRl7rDF-acfHXo0vbkDRt-ZQhQRNqO";
        
        let filesData = [];
        let currentCategory = 'all';
        let currentPreviewId = null;

        window.onload = () => {
            setupAutoFilenamePreview();
            syncDrive();
        };

        function getFolderId() {
            return localStorage.getItem('htmlManager_folderId') || DEFAULT_FOLDER_ID;
        }

        function openSettings() {
            const pwd = prompt("請輸入系統密碼以進入設定：");
            if (pwd === "7675300") {
                document.getElementById('setting-folder-id').value = getFolderId();
                document.getElementById('settings-modal').classList.remove('hidden');
                document.getElementById('settings-modal').classList.add('flex');
            } else if (pwd !== null) {
                showToast('密碼錯誤，無法存取', 'error');
            }
        }

        function saveSettings() {
            const newId = document.getElementById('setting-folder-id').value.trim();
            if(newId) {
                localStorage.setItem('htmlManager_folderId', newId);
                closeModal('settings-modal');
                showToast('設定已更新，重新載入書櫃...', 'success');
                syncDrive();
            }
        }

        function extractDescription(htmlContent) {
            const tag = String.fromCharCode(60) + 'meta name="app-description" content="(.*?)"' + String.fromCharCode(62);
            const regex = new RegExp(tag, 'i');
            const match = htmlContent.match(regex);
            return match ? match[1] : "";
        }

        function injectDescription(htmlContent, description) {
            const cleanPattern = String.fromCharCode(60) + 'meta name="app-description" content=".*?"' + String.fromCharCode(62) + '\\n?';
            let cleanHtml = htmlContent.replace(new RegExp(cleanPattern, 'gi'), '');
            if(!description.trim()) return cleanHtml;

            const metaTag = String.fromCharCode(60) + 'meta name="app-description" content="' + description + '"' + String.fromCharCode(62) + '\n';
            const headEnd = String.fromCharCode(60, 47, 104, 101, 97, 100, 62); 
            const htmlStart = String.fromCharCode(60, 104, 116, 109, 108, 62); 
            const headStart = String.fromCharCode(60, 104, 101, 97, 100, 62); 
            
            if (cleanHtml.includes(headEnd)) {
                return cleanHtml.replace(headEnd, metaTag + headEnd);
            } else if (cleanHtml.includes(htmlStart)) {
                return cleanHtml.replace(htmlStart, htmlStart + '\n' + headStart + '\n' + metaTag + headEnd);
            } else {
                return metaTag + cleanHtml; 
            }
        }

        function syncDrive() {
            const folderId = getFolderId();
            showLoader('沖泡中... 請稍候');

            fetch(`${GAS_API_URL}?action=getFiles&folderId=${folderId}`)
                .then(res => res.json())
                .then(response => {
                    hideLoader();
                    if (response.success) {
                        filesData = response.data;
                        renderApp();
                        showToast(`已為您準備好 ${filesData.length} 份文件`, 'success');
                    } else {
                        showToast('讀取失敗：' + response.error, 'error');
                    }
                })
                .catch(error => {
                    hideLoader();
                    console.error('Fetch 錯誤:', error);
                    showToast('連線異常，請檢查網路或權限設定', 'error');
                });
        }

        function saveFile() {
            const form = document.getElementById('file-form');
            if (!form.checkValidity()) return form.reportValidity();

            const rawContent = document.getElementById('file-content').value;
            const description = document.getElementById('file-description').value;
            const finalContent = injectDescription(rawContent, description);

            const payload = {
                action: 'saveFile',
                folderId: getFolderId(),
                fileId: document.getElementById('file-id').value,
                category: document.getElementById('file-category').value.trim(),
                name: document.getElementById('file-name').value.trim(),
                developer: document.getElementById('file-developer').value.trim(),
                content: finalContent
            };

            showLoader('正在為您歸檔...');
            document.getElementById('save-btn').disabled = true;

            fetch(GAS_API_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                body: JSON.stringify(payload)
            })
            .then(res => res.json())
            .then(response => {
                hideLoader();
                document.getElementById('save-btn').disabled = false;
                if (response.success) {
                    closeModal('file-modal');
                    showToast('作品已妥善收藏', 'success');
                    syncDrive();
                } else {
                    showToast('歸檔失敗：' + response.error, 'error');
                }
            })
            .catch(error => {
                hideLoader();
                document.getElementById('save-btn').disabled = false;
                showToast('系統異常，無法歸檔', 'error');
            });
        }

        function deleteFile(id, fileName) {
            document.getElementById('delete-modal-message').innerHTML = `您確定要將 <span class="font-bold text-red-600">「${fileName}」</span> 丟棄嗎？<br>這個動作無法復原喔。`;
            document.getElementById('delete-file-id').value = id;
            document.getElementById('delete-password').value = ''; 
            
            document.getElementById('delete-modal').classList.remove('hidden');
            document.getElementById('delete-modal').classList.add('flex');
        }

        function confirmDeleteAction() {
            const pwd = document.getElementById('delete-password').value;
            if (pwd !== "7675300") {
                showToast('密碼不正確', 'error');
                return;
            }

            const id = document.getElementById('delete-file-id').value;
            closeModal('delete-modal');
            showLoader('清理中...');

            fetch(GAS_API_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                body: JSON.stringify({ action: 'deleteFile', fileId: id })
            })
            .then(res => res.json())
            .then(response => {
                hideLoader();
                if (response.success) {
                    showToast('檔案已清理', 'success');
                    syncDrive();
                } else {
                    showToast('清理失敗：' + response.error, 'error');
                }
            })
            .catch(error => {
                hideLoader();
                showToast('系統異常，無法清理', 'error');
            });
        }

        function downloadFile(id) {
            const file = filesData.find(f => f.id === id);
            if(!file) return;
            const filename = `${file.category}-${file.name}-${file.developer}.html`;
            const blob = new Blob([file.content], { type: "text/html;charset=utf-8" });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = filename;
            a.click();
            URL.revokeObjectURL(url);
            showToast(`已準備好：${filename}`, 'success');
        }

        function downloadAllZip() {
            if (filesData.length === 0) {
                showToast('書櫃目前是空的', 'error');
                return;
            }
            
            showLoader('正在為您打包...');
            const zip = new JSZip();
            
            filesData.forEach(file => {
                const filename = `${file.category}-${file.name}-${file.developer}.html`;
                zip.file(filename, file.content);
            });

            zip.generateAsync({ type: "blob" }).then(function(content) {
                hideLoader();
                const url = URL.createObjectURL(content);
                const a = document.createElement('a');
                a.href = url;
                a.download = "網頁作品備份.zip";
                a.click();
                URL.revokeObjectURL(url);
                showToast('打包完成！', 'success');
            });
        }

        function renderApp() {
            renderCategories();
            renderFiles();
        }

        function renderCategories() {
            const list = document.getElementById('category-list');
            const categories = ['all', ...new Set(filesData.map(f => f.category))];
            list.innerHTML = '';
            
            categories.forEach(cat => {
                const isSelected = currentCategory === cat;
                const title = cat === 'all' ? '全部書籤' : cat;
                const count = cat === 'all' ? filesData.length : filesData.filter(f => f.category === cat).length;
                
                const btn = document.createElement('button');
                btn.className = `w-full text-left px-4 py-3 rounded-xl mb-1 flex items-center justify-between transition duration-200 ${isSelected ? 'bg-sage-50 text-sage-700 font-bold shadow-[inset_4px_0_0_#7e9e8c]' : 'text-mocha-600 hover:bg-mocha-50/80'}`;
                btn.onclick = () => {
                    currentCategory = cat;
                    document.getElementById('current-category-title').innerText = title;
                    renderApp();
                };
                
                const iconColor = isSelected ? 'text-sage-600' : 'text-mocha-400';
                const badgeClass = isSelected ? 'bg-sage-100 text-sage-700' : 'bg-mocha-100/80 text-mocha-500';
                const icon = cat === 'all' ? 'fa-book-bookmark' : 'fa-bookmark';

                btn.innerHTML = `<span><i class="fa-solid ${icon} w-5 text-center mr-2 ${iconColor}"></i>${title}</span>
                                 <span class="text-xs ${badgeClass} py-0.5 px-2 rounded-full font-bold">${count}</span>`;
                list.appendChild(btn);
            });
        }

        function renderFiles() {
            const container = document.getElementById('files-container');
            const files = currentCategory === 'all' ? filesData : filesData.filter(f => f.category === currentCategory);
            document.getElementById('file-count').innerText = `共 ${files.length} 份文件`;
            container.innerHTML = '';

            if(files.length === 0) {
                container.innerHTML = `
                    <div class="col-span-full py-32 flex flex-col items-center justify-center text-mocha-300">
                        <i class="fa-solid fa-mug-hot text-5xl mb-5 opacity-50"></i>
                        <p class="text-lg font-medium tracking-wide">目前沒有收藏任何作品</p>
                    </div>`;
                return;
            }

            files.forEach(file => {
                const fName = `${file.category}-${file.name}-${file.developer}.html`;
                const desc = extractDescription(file.content) || "尚未填寫內容簡介...";

                const card = document.createElement('div');
                card.className = 'bg-white rounded-2xl shadow-sm hover:shadow-[0_8px_30px_rgba(0,0,0,0.06)] border border-mocha-100 transition-all duration-300 p-6 flex flex-col group relative';
                
                // 左側裝飾線
                const sideBar = document.createElement('div');
                sideBar.className = 'absolute top-6 bottom-6 left-0 w-1 bg-sage-300 rounded-r-md opacity-30 group-hover:opacity-100 transition-opacity';
                card.appendChild(sideBar);

                card.innerHTML += `
                    <div class="flex justify-between items-start mb-4">
                        <span class="text-xs font-bold tracking-wider px-2.5 py-1 bg-mocha-50 text-mocha-600 rounded-md border border-mocha-100">${file.category}</span>
                        <div class="opacity-0 group-hover:opacity-100 transition-opacity space-x-1 flex items-center bg-white rounded-lg p-1 shadow-sm border border-mocha-50">
                            <button onclick="downloadFile('${file.id}')" class="w-8 h-8 flex items-center justify-center rounded-md text-mocha-400 hover:text-sage-600 hover:bg-sage-50 transition" title="下載"><i class="fa-solid fa-download text-sm"></i></button>
                            <button onclick="openModal('edit', '${file.id}')" class="w-8 h-8 flex items-center justify-center rounded-md text-mocha-400 hover:text-mocha-700 hover:bg-mocha-50 transition" title="編輯"><i class="fa-solid fa-pen text-sm"></i></button>
                            <button onclick="deleteFile('${file.id}', '${fName}')" class="w-8 h-8 flex items-center justify-center rounded-md text-mocha-400 hover:text-red-500 hover:bg-red-50 transition" title="刪除"><i class="fa-solid fa-trash text-sm"></i></button>
                        </div>
                    </div>
                    <h3 class="text-xl font-bold text-mocha-900 mb-1 truncate" title="${file.name}">${file.name}</h3>
                    <p class="text-sm text-mocha-500 mb-4 font-medium flex items-center"><i class="fa-solid fa-pen-nib mr-2 opacity-70"></i> ${file.developer}</p>
                    
                    <div class="mb-6 flex-1">
                        <p class="text-sm text-mocha-600 line-clamp-2 leading-relaxed" title="${desc}">${desc}</p>
                    </div>

                    <button onclick="runFile('${file.id}')" class="mt-auto w-full bg-mocha-50 text-mocha-700 font-medium py-2.5 rounded-xl hover:bg-sage-500 hover:text-white transition-colors duration-300 flex items-center justify-center border border-mocha-100 hover:border-sage-500">
                        <i class="fa-regular fa-eye mr-2"></i> 閱讀網頁
                    </button>
                `;
                container.appendChild(card);
            });
        }

        function setupAutoFilenamePreview() {
            const updatePreview = () => {
                const c = document.getElementById('file-category').value.trim() || '類別';
                const n = document.getElementById('file-name').value.trim() || '網頁名稱';
                const d = document.getElementById('file-developer').value.trim() || '開發者';
                document.getElementById('preview-filename').innerText = `${c}-${n}-${d}.html`;
            };
            ['file-category', 'file-name', 'file-developer'].forEach(id => {
                document.getElementById(id).addEventListener('input', updatePreview);
            });
        }

        function openModal(mode, id = null) {
            const modal = document.getElementById('file-modal');
            document.getElementById('file-form').reset();
            
            if (mode === 'add') {
                document.getElementById('modal-title').innerText = '撰寫新網頁';
                document.getElementById('file-id').value = '';
                document.getElementById('preview-filename').innerText = '類別-網頁名稱-開發者.html';
                document.getElementById('file-description').value = '';
            } else if (mode === 'edit' && id) {
                document.getElementById('modal-title').innerText = '修改網頁內容';
                const file = filesData.find(f => f.id === id);
                if (file) {
                    document.getElementById('file-id').value = file.id;
                    document.getElementById('file-category').value = file.category;
                    document.getElementById('file-name').value = file.name;
                    document.getElementById('file-developer').value = file.developer;
                    document.getElementById('file-content').value = file.content;
                    document.getElementById('file-description').value = extractDescription(file.content);
                    document.getElementById('preview-filename').innerText = `${file.category}-${file.name}-${file.developer}.html`;
                }
            }
            modal.classList.remove('hidden');
            modal.classList.add('flex');
        }

        function closeModal(id) {
            document.getElementById(id).classList.add('hidden');
            document.getElementById(id).classList.remove('flex');
            
            if(id === 'preview-modal') {
                document.getElementById('preview-frame').srcdoc = '';
                currentPreviewId = null;
                if (document.fullscreenElement) document.exitFullscreen();
            }
        }

        function runFile(id) {
            const file = filesData.find(f => f.id === id);
            if (!file) return;
            currentPreviewId = id;
            
            document.getElementById('preview-title').innerText = `${file.category}-${file.name}-${file.developer}.html`;
            document.getElementById('preview-frame').srcdoc = file.content;
            document.getElementById('preview-modal').classList.remove('hidden');
            document.getElementById('preview-modal').classList.add('flex');
        }

        function toggleFullScreen() {
            const iframe = document.getElementById('preview-frame');
            if (!document.fullscreenElement) {
                if (iframe.requestFullscreen) iframe.requestFullscreen();
                else if (iframe.webkitRequestFullscreen) iframe.webkitRequestFullscreen();
                else if (iframe.msRequestFullscreen) iframe.msRequestFullscreen();
            } else {
                if (document.exitFullscreen) document.exitFullscreen();
            }
        }

        function openInNewTab() {
            if (!currentPreviewId) return;
            const file = filesData.find(f => f.id === currentPreviewId);
            if (!file) return;

            const newWin = window.open('', '_blank');
            if (newWin) {
                newWin.document.open();
                newWin.document.write(file.content);
                newWin.document.close();
                newWin.document.title = `${file.category}-${file.name}-${file.developer}.html`;
            } else {
                showToast('請允許瀏覽器彈出視窗以開啟新分頁', 'error');
            }
        }

        function showLoader(text) {
            document.getElementById('loader-text').innerText = text;
            document.body.classList.add('loading');
        }

        function hideLoader() {
            document.body.classList.remove('loading');
        }

        function showToast(msg, type = 'success') {
            const toast = document.getElementById('toast');
            const icon = document.getElementById('toast-icon');
            const text = document.getElementById('toast-message');
            
            text.innerText = msg;
            // 吐司提示改為置中浮動，背景較深色以凸顯質感
            toast.className = `fixed bottom-10 left-1/2 transform -translate-x-1/2 transition-all duration-300 px-6 py-3 rounded-full shadow-lg z-[100] flex items-center space-x-3 text-white`;
            
            if(type === 'success') {
                toast.classList.add('bg-sage-600');
                icon.className = 'fa-solid fa-check text-sm bg-white/20 p-1 rounded-full';
            } else {
                toast.classList.add('bg-mocha-800');
                icon.className = 'fa-solid fa-exclamation text-sm bg-white/20 p-1 rounded-full px-2';
            }
            
            toast.classList.remove('translate-y-24', 'opacity-0');
            setTimeout(() => toast.classList.add('translate-y-24', 'opacity-0'), 3000);
        }
    </script>
</body>
</html>
