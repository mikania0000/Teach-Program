<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>鳳甲AI咖啡館 V.1.16</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet" />
    <script>
        tailwind.config = { theme: { extend: { colors: { mocha: { 50: '#fdfbf7', 600: '#b87349', 900: '#5b3226' }, sage: { 500: '#608270' } } } } }
    </script>
</head>
<body class="bg-mocha-50 text-mocha-900 h-[100dvh] flex flex-col">

    <div id="loader" class="fixed inset-0 bg-mocha-50/90 z-[999] hidden flex-col items-center justify-center">
        <i class="fa-solid fa-mug-hot fa-bounce text-6xl text-mocha-500 mb-6"></i>
        <p class="text-xl font-bold" id="loader-text">咖啡師為您沖泡中...</p>
    </div>

    <main id="main-container" class="flex-1 p-6">
        <h1 class="text-3xl font-black mb-4">鳳甲 AI 咖啡館</h1>
        <div id="files-container" class="grid grid-cols-1 md:grid-cols-3 gap-6"></div>
    </main>

    <script>
        // --- 設定區 ---
        const GAS_API_URL = "https://script.google.com/macros/s/AKfycbxT12tUyOPb8Bhj2dO_abB4596dydNpPNexrACPe44C_m91gkjBLrm6YhDZcirIQfQp/exec";
        const APP_PASSWORD = "300300";
        let filesData = [];

        // --- 初始化 ---
        window.onload = () => {
            if (localStorage.getItem('coffee_auth') === APP_PASSWORD) {
                initializeApp();
            } else {
                const pwd = prompt("請輸入咖啡館密碼：");
                if (pwd === APP_PASSWORD) {
                    localStorage.setItem('coffee_auth', APP_PASSWORD);
                    initializeApp();
                } else {
                    alert("密碼錯誤，請重新整理頁面");
                }
            }
        };

        async function initializeApp() {
            await loadFiles();
        }

        // --- 核心動作：整理吧台 (取得清單) ---
        async function loadFiles() {
            document.getElementById('loader').classList.remove('hidden');
            try {
                const res = await fetch(`${GAS_API_URL}?action=listFiles`);
                const data = await res.json();
                filesData = data.files || [];
                renderFiles();
            } catch (err) {
                console.error(err);
                alert("吧台連線失敗，請檢查網路。");
            } finally {
                document.getElementById('loader').classList.add('hidden');
            }
        }

        // --- 核心動作：上架菜單 (儲存檔案) ---
        async function saveFile(fileData) {
            document.getElementById('loader').classList.remove('hidden');
            try {
                await fetch(GAS_API_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    body: JSON.stringify({ action: 'saveFile', data: fileData })
                });
                alert("特調已成功上架！");
                loadFiles();
            } catch (err) {
                alert("上架失敗。");
            } finally {
                document.getElementById('loader').classList.add('hidden');
            }
        }

        function renderFiles() {
            const container = document.getElementById('files-container');
            container.innerHTML = filesData.map(file => `
                <div class="bg-white p-6 rounded-2xl shadow-sm border border-mocha-100">
                    <h2 class="font-bold text-lg">${file.name}</h2>
                    <p class="text-sm text-gray-500">${file.description || '無描述'}</p>
                </div>
            `).join('');
        }
    </script>
</body>
</html>
