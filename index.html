<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="theme-color" content="#fdfbf7" />
    
    <title>鳳甲AI咖啡館 V.1.16</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        mocha: {
                            50: '#fdfbf7',  100: '#f6f1e9', 200: '#eaddc8', 300: '#dcb897',
                            400: '#ce946b', 500: '#b87349', 600: '#a35a39', 700: '#884632',
                            800: '#703a2c', 900: '#5b3226',
                        },
                        sage: {
                            50: '#f4f7f4',  100: '#e4ebe4', 200: '#cbdad1', 300: '#a6bfb0',
                            400: '#7e9e8c', 500: '#608270', 600: '#4a6758', 700: '#3e5348',
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Helvetica Neue', Helvetica, Arial, 'Microsoft JhengHei', sans-serif; }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #fdfbf7; border-radius: 4px; }
        ::-webkit-scrollbar-thumb { background: #eaddc8; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #dcb897; }
        
        /* 隱藏水平滾動條但保留滾動功能 */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        .fade-in { animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        
        @keyframes float { 0%, 100% { transform: translateY(0px) rotate(0deg); } 50% { transform: translateY(-15px) rotate(5deg); } }
        @keyframes float-reverse { 0%, 100% { transform: translateY(0px) rotate(0deg); } 50% { transform: translateY(-20px) rotate(-8deg); } }
        .float-anim { animation: float 6s ease-in-out infinite; }
        .float-anim-rev { animation: float-reverse 7s ease-in-out infinite; }
        .delay-1 { animation-delay: 1.5s; }
        .delay-2 { animation-delay: 3s; }

        #loader { display: none; }
        body.loading #loader { display: flex; }
        #preview-frame:fullscreen { background-color: #fdfbf7; width: 100vw; height: 100vh; }
        .line-clamp-2 { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }

        /* 咖啡廳手寫筆記風邊框 */
        .tasting-note { position: relative; }
        .tasting-note::before {
            content: ''; position: absolute; left: 0; top: 10%; bottom: 10%; width: 3px; background-color: #dcb897; border-radius: 2px;
        }

        @media (max-width: 767px) {
            body[data-mobile-tab="files"] #sidebar-container { display: none !important; }
            body[data-mobile-tab="files"] #main-container { display: flex !important; }

            body[data-mobile-tab="categories"] #sidebar-container { display: flex !important; width: 100%; flex: 1; }
            body[data-mobile-tab="categories"] #main-container { display: none !important; }
            body[data-mobile-tab="categories"] #section-categories { display: flex !important; }
            body[data-mobile-tab="categories"] #section-actions { display: none !important; }

            body[data-mobile-tab="actions"] #sidebar-container { display: flex !important; width: 100%; flex: 1; background: #fdfbf7;}
            body[data-mobile-tab="actions"] #main-container { display: none !important; }
            body[data-mobile-tab="actions"] #section-categories { display: none !important; }
            body[data-mobile-tab="actions"] #section-actions { display: block !important; padding: 2rem; flex: 1; }
        }
    </style>
</head>
<body class="bg-mocha-50 text-mocha-900 h-[100dvh] flex flex-col selection:bg-mocha-200 text-base md:text-lg" data-mobile-tab="files">

    <!-- 全局載入中遮罩 -->
    <div id="loader" class="fixed inset-0 bg-mocha-50/90 backdrop-blur-sm z-[999] flex-col items-center justify-center fade-in">
        <i class="fa-solid fa-mug-hot fa-bounce text-6xl md:text-7xl text-mocha-500 mb-6"></i>
        <p class="text-xl md:text-2xl font-bold text-mocha-800 tracking-widest" id="loader-text">咖啡師為您沖泡中...</p>
    </div>

    <!-- QR Code / 密碼認證門禁 (進入時顯示) -->
    <div id="auth-overlay" class="fixed inset-0 bg-mocha-900/95 backdrop-blur-md z-[1000] hidden flex-col items-center justify-center fade-in px-4">
        <div class="bg-white rounded-3xl shadow-2xl w-full max-w-sm overflow-hidden flex flex-col border-t-8 border-mocha-600">
            <div class="p-8 text-center bg-[#fffdfa] relative">
                <i class="fa-solid fa-store text-mocha-200 text-6xl absolute top-4 left-4 opacity-20"></i>
                <i class="fa-solid fa-lock-open text-mocha-500 text-5xl mb-4 relative z-10 drop-shadow-sm"></i>
                <h2 class="text-2xl font-black text-mocha-900 mb-2 relative z-10">專屬門禁</h2>
                <p class="text-mocha-500 text-sm font-bold mb-4 relative z-10">首次請輸入密碼</p>

                <!-- 顯示給手機掃描的 QR Code -->
                <div class="flex flex-col items-center mb-5 relative z-10">
                    <div class="bg-white p-2 rounded-xl shadow-sm border border-mocha-100">
                        <img id="auth-qr-image" src="" class="w-32 h-32" alt="手機掃碼進入">
                    </div>
                    <p class="text-xs text-mocha-500 mt-2 font-bold flex items-center justify-center">
                        <i class="fa-solid fa-mobile-screen mr-1.5 text-mocha-400"></i>用手機相機掃碼開啟本站
                    </p>
                </div>

                <div class="space-y-4 relative z-10" id="auth-inputs">
                    <input type="password" id="auth-password" placeholder="請輸入密碼" class="w-full text-center text-xl tracking-widest bg-white border border-mocha-200 rounded-xl p-3 outline-none focus:ring-2 focus:ring-mocha-500 shadow-sm transition" />
                    <button onclick="verifyPassword()" class="w-full bg-mocha-600 hover:bg-mocha-700 text-white font-bold py-3.5 rounded-xl transition shadow-md flex items-center justify-center">
                        <i class="fa-solid fa-arrow-right-to-bracket mr-2"></i> 進入咖啡館
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- 手機版頂部標題列 -->
    <header class="md:hidden bg-white border-b border-mocha-100 px-6 py-4 flex justify-between items-center shadow-sm z-20 flex-shrink-0">
        <div class="flex items-center text-mocha-800 font-bold text-xl tracking-wide">
            <i class="fa-solid fa-store text-mocha-500 mr-2.5 text-2xl"></i> 鳳甲 AI 咖啡館
        </div>
        <span class="text-xs font-bold text-mocha-500 bg-mocha-100 px-2 py-1 rounded-md border border-mocha-200 shadow-sm">V.1.16</span>
    </header>

    <div class="flex flex-1 overflow-hidden relative">
        <!-- 左側分類導覽列 (POS 機選單區) -->
        <aside id="sidebar-container" class="hidden md:flex flex-col w-full md:w-80 bg-white border-r border-mocha-100 z-20 h-full shadow-[4px_0_24px_rgba(0,0,0,0.02)]">
            <div class="hidden md:flex p-6 border-b border-mocha-100 items-center space-x-4 bg-mocha-50/80">
                <div class="bg-mocha-600 text-white w-12 h-12 rounded-2xl flex items-center justify-center shadow-md transform -rotate-3 hover:rotate-0 transition-transform flex-shrink-0">
                    <i class="fa-solid fa-store text-xl"></i>
                </div>
                <div>
                    <h1 class="text-xl md:text-2xl font-bold text-mocha-800 tracking-wide leading-tight">鳳甲 AI 咖啡館</h1>
                    <span class="text-xs font-bold text-mocha-500 bg-mocha-100 px-2.5 py-0.5 rounded-md mt-1 inline-block border border-mocha-200 shadow-sm">應用教學 V.1.16</span>
                </div>
            </div>
            
            <div id="section-categories" class="flex flex-col flex-1 h-full overflow-hidden">
                <div class="md:hidden px-6 py-4 bg-mocha-50 text-mocha-700 font-bold border-b border-mocha-100 flex items-center">
                    <i class="fa-solid fa-tags mr-2 text-sage-500"></i> 請選擇風味系列
                </div>
                <div class="p-5 flex-1 overflow-y-auto space-y-1.5 relative" id="category-list"></div>
            </div>
            
            <div id="section-actions" class="hidden md:block p-5 border-t border-mocha-100 space-y-3 bg-mocha-50/30 overflow-y-auto">
                <div class="md:hidden pb-4 text-center text-mocha-800 font-bold text-xl flex items-center justify-center border-b border-mocha-100 mb-4">
                    <i class="fa-solid fa-concierge-bell text-mocha-500 mr-2"></i> 櫃台服務
                </div>
                <button onclick="openModal('add')" class="w-full bg-mocha-600 hover:bg-mocha-700 text-white text-base font-bold py-3 px-4 rounded-xl transition duration-300 shadow-md flex items-center justify-center space-x-2 group">
                    <i class="fa-solid fa-fire-burner group-hover:animate-pulse"></i>
                    <span>研發新特調</span>
                </button>
                <button onclick="syncDrive()" class="w-full bg-white hover:bg-mocha-100 text-mocha-700 text-base font-bold py-2.5 px-4 rounded-xl transition duration-300 flex items-center justify-center space-x-2 group border border-mocha-200 shadow-sm">
                    <i class="fa-solid fa-broom group-hover:scale-110 transition-transform text-mocha-400"></i>
                    <span>整理吧台 (重新載入)</span>
                </button>
                <button onclick="downloadAllZip()" class="w-full bg-sage-50 hover:bg-sage-100 text-sage-700 text-base font-bold py-2.5 px-4 rounded-xl transition duration-300 flex items-center justify-center space-x-2 group border border-sage-200 shadow-sm">
                    <i class="fa-solid fa-bag-shopping group-hover:-translate-y-1 transition-transform"></i>
                    <span>全品項外帶</span>
                </button>
                <button onclick="openSettings()" class="w-full text-mocha-400 hover:text-mocha-600 font-bold py-2 text-sm transition flex items-center justify-center mt-2 group">
                    <i class="fa-solid fa-sliders mr-2 group-hover:rotate-90 transition-transform"></i> 咖啡館設定
                </button>
                
                <!-- 新增登出按鈕 -->
                <button onclick="logoutApp()" class="w-full text-red-400 hover:text-red-600 font-bold py-2 text-sm transition flex items-center justify-center mt-1 group">
                    <i class="fa-solid fa-right-from-bracket mr-2 group-hover:-translate-x-1 transition-transform"></i> 登出並清除手機記憶
                </button>
            </div>
        </aside>

        <!-- 右側主要內容區 (菜單展示區) -->
        <main id="main-container" class="flex flex-col flex-1 h-full overflow-hidden relative bg-[#fffdfa]">
            <!-- 裝飾背景 -->
            <div class="absolute top-0 right-0 w-full h-72 bg-gradient-to-b from-mocha-50 to-transparent opacity-90 pointer-events-none z-0"></div>
            <i class="fa-solid fa-mug-hot absolute right-4 md:right-16 top-10 md:top-24 text-mocha-200 opacity-[0.15] text-6xl md:text-8xl float-anim z-0 pointer-events-none"></i>
            <i class="fa-solid fa-cookie-bite absolute left-1/4 bottom-10 md:bottom-20 text-mocha-300 opacity-[0.12] text-5xl md:text-7xl float-anim-rev delay-1 z-0 pointer-events-none"></i>
            <i class="fa-solid fa-leaf absolute right-1/3 bottom-1/4 text-sage-200 opacity-[0.15] text-5xl md:text-7xl float-anim delay-2 z-0 pointer-events-none"></i>

            <header class="pt-8 md:pt-12 pb-4 px-6 md:px-12 flex justify-between items-end z-10 relative mx-6 md:mx-0">
                <div>
                    <h2 class="text-3xl md:text-4xl font-black text-mocha-900 tracking-tight" id="current-category-title">今日菜單</h2>
                    <div class="text-base md:text-lg text-mocha-500 mt-2 md:mt-3 font-bold flex items-center">
                        <i class="fa-solid fa-clipboard-list text-mocha-400 mr-2 text-lg md:text-xl"></i>
                        <span id="file-count">為您準備了 0 款特調</span>
                    </div>
                </div>
            </header>

            <!-- 🌈 咖啡師 (開發者) 分頁標籤區 -->
            <div class="px-6 md:px-12 pb-3 pt-1 border-b border-mocha-100/50 flex gap-2 overflow-x-auto no-scrollbar z-10 relative mx-6 md:mx-0" id="developer-tabs-container">
                <!-- 咖啡師標籤將由 JS 動態生成 -->
            </div>

            <div class="flex-1 overflow-y-auto px-6 md:px-12 pt-6 pb-24 md:pb-12 z-10 relative">
                <!-- 菜單項目卡片網格 -->
                <div class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-6 md:gap-8" id="files-container"></div>
            </div>
        </main>
    </div>

    <!-- 手機版底部導航列 -->
    <nav class="md:hidden flex bg-white border-t border-mocha-100 z-30 shadow-[0_-4px_20px_rgba(0,0,0,0.05)] pb-safe absolute bottom-0 w-full">
        <button onclick="switchMobileTab('files')" id="tab-btn-files" class="mobile-tab-btn flex-1 py-3.5 flex flex-col items-center text-sage-600 font-bold transition-colors">
            <i class="fa-solid fa-clipboard-list text-xl mb-1.5"></i>
            <span class="text-xs tracking-wider">菜單</span>
        </button>
        <button onclick="switchMobileTab('categories')" id="tab-btn-categories" class="mobile-tab-btn flex-1 py-3.5 flex flex-col items-center text-mocha-400 font-medium transition-colors">
            <i class="fa-solid fa-tags text-xl mb-1.5"></i>
            <span class="text-xs tracking-wider">風味</span>
        </button>
        <button onclick="switchMobileTab('actions')" id="tab-btn-actions" class="mobile-tab-btn flex-1 py-3.5 flex flex-col items-center text-mocha-400 font-medium transition-colors">
            <i class="fa-solid fa-concierge-bell text-xl mb-1.5"></i>
            <span class="text-xs tracking-wider">櫃台</span>
        </button>
    </nav>

    <!-- 新增/修改 Modal (配方表) -->
    <div id="file-modal" class="fixed inset-0 bg-mocha-900/60 backdrop-blur-sm hidden items-center justify-center z-50 fade-in p-4 md:p-0">
        <div class="bg-white rounded-3xl shadow-2xl w-full max-w-5xl max-h-[90vh] flex flex-col overflow-hidden border-t-8 border-mocha-600">
            <div class="p-6 md:p-8 border-b border-mocha-100 flex justify-between items-center bg-[#fffdfa]">
                <h3 class="text-xl md:text-2xl font-black text-mocha-800 flex items-center"><i class="fa-solid fa-scroll text-mocha-500 mr-3"></i> <span id="modal-title">特調配方表</span></h3>
                <button onclick="closeModal('file-modal')" class="text-mocha-400 hover:text-red-500 transition bg-mocha-50 hover:bg-red-50 w-10 h-10 rounded-full flex items-center justify-center">
                    <i class="fa-solid fa-times text-xl"></i>
                </button>
            </div>
            <div class="p-6 md:p-10 flex-1 overflow-y-auto bg-[#fffdfa] relative">
                <i class="fa-solid fa-mug-saucer absolute right-4 md:right-10 bottom-10 text-[6rem] md:text-[12rem] text-mocha-50 opacity-60 z-0 pointer-events-none -rotate-12"></i>
                
                <form id="file-form" class="space-y-6 md:space-y-8 relative z-10">
                    <input type="hidden" id="file-id" />
                    
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6 md:gap-8">
                        <div>
                            <label class="block text-sm md:text-base font-bold text-mocha-700 mb-2"><i class="fa-solid fa-tag text-mocha-400 mr-1.5"></i>風味系列</label>
                            <input type="text" id="file-category" list="category-options" placeholder="例如：教學" required class="w-full text-base md:text-lg bg-white border border-mocha-200 rounded-xl p-3 md:p-4 outline-none focus:ring-2 focus:ring-mocha-500 focus:border-mocha-500 transition shadow-sm text-mocha-800" />
                            <datalist id="category-options">
                                <option value="教學"></option>
                                <option value="導師"></option>
                                <option value="行政"></option>
                            </datalist>
                        </div>
                        <div>
                            <label class="block text-sm md:text-base font-bold text-mocha-700 mb-2"><i class="fa-solid fa-font text-mocha-400 mr-1.5"></i>特調名稱</label>
                            <input type="text" id="file-name" placeholder="例如：計分板" required class="w-full text-base md:text-lg bg-white border border-mocha-200 rounded-xl p-3 md:p-4 outline-none focus:ring-2 focus:ring-mocha-500 focus:border-mocha-500 transition shadow-sm text-mocha-800" />
                        </div>
                        <div>
                            <label class="block text-sm md:text-base font-bold text-mocha-700 mb-2"><i class="fa-solid fa-user-tie text-mocha-400 mr-1.5"></i>咖啡師 (開發者)</label>
                            <input type="text" id="file-developer" placeholder="例如：您的名字" required class="w-full text-base md:text-lg bg-white border border-mocha-200 rounded-xl p-3 md:p-4 outline-none focus:ring-2 focus:ring-mocha-500 focus:border-mocha-500 transition shadow-sm text-mocha-800" />
                        </div>
                        <div>
                            <label class="block text-sm md:text-base font-bold text-mocha-700 mb-2"><i class="fa-solid fa-display text-mocha-400 mr-1.5"></i>適用設備</label>
                            <select id="file-device" required class="w-full text-base md:text-lg bg-white border border-mocha-200 rounded-xl p-3 md:p-[15px] outline-none focus:ring-2 focus:ring-mocha-500 focus:border-mocha-500 transition shadow-sm text-mocha-800 cursor-pointer">
                                <option value="均可">均可 (手機 / 電腦)</option>
                                <option value="手機">手機專屬</option>
                                <option value="大螢幕">大螢幕專屬</option>
                            </select>
                        </div>
                    </div>

                    <div>
                        <label class="block text-sm md:text-base font-bold text-mocha-700 mb-2"><i class="fa-solid fa-pen-nib text-mocha-400 mr-1.5"></i>風味筆記 (用途簡介)</label>
                        <textarea id="file-description" rows="3" placeholder="寫下這杯特調的口感或用途..." class="w-full text-base md:text-lg bg-white border border-mocha-200 rounded-xl p-3 md:p-4 outline-none focus:ring-2 focus:ring-mocha-500 focus:border-mocha-500 transition shadow-sm resize-none text-mocha-800"></textarea>
                    </div>
                    
                    <div class="text-xs md:text-sm font-bold text-mocha-500 flex items-center justify-end">
                        <i class="fa-solid fa-receipt mr-2 text-sm md:text-base"></i>
                        杯身標籤將印為：<span id="preview-filename" class="text-mocha-700 ml-2 font-mono bg-mocha-100 px-2 py-1 rounded text-xs md:text-base border border-mocha-200">檔案名稱.html</span>
                    </div>

                    <div>
                        <label class="block text-sm md:text-base font-bold text-mocha-700 mb-2"><i class="fa-solid fa-code text-mocha-400 mr-1.5"></i>特調秘方 (HTML 原始碼)</label>
                        <textarea id="file-content" required rows="8" placeholder="在此貼上程式碼..." class="w-full text-sm md:text-base bg-slate-800 text-green-400 border border-mocha-200 rounded-xl p-4 md:p-5 font-mono outline-none focus:ring-2 focus:ring-mocha-500 shadow-inner"></textarea>
                    </div>
                </form>
            </div>
            <div class="p-5 md:p-7 border-t border-mocha-100 flex justify-end space-x-3 md:space-x-5 bg-mocha-50">
                <button onclick="closeModal('file-modal')" class="px-5 py-2.5 md:px-8 md:py-3 text-base md:text-lg text-mocha-600 bg-white border border-mocha-200 rounded-xl hover:bg-mocha-100 transition font-bold">先不要</button>
                <button id="save-btn" onclick="saveFile()" class="px-5 py-2.5 md:px-8 md:py-3 text-base md:text-lg text-white bg-mocha-600 rounded-xl hover:bg-mocha-700 transition font-bold shadow-md flex items-center">
                    <i class="fa-solid fa-check mr-2"></i>上架菜單
                </button>
            </div>
        </div>
    </div>

    <!-- 執行/預覽 Modal -->
    <div id="preview-modal" class="fixed inset-0 bg-mocha-900/95 hidden flex-col z-[60] fade-in">
        <div class="flex justify-between items-center px-4 py-3 md:px-6 md:py-4 bg-transparent text-mocha-100">
            <h3 class="text-base md:text-xl font-bold flex items-center truncate max-w-xs md:max-w-2xl">
                <i class="fa-solid fa-mug-hot text-sage-400 mr-3"></i> 
                <span id="preview-title" class="tracking-wide truncate">享用特調中</span>
            </h3>
            
            <div class="flex items-center space-x-2 md:space-x-4">
                <button onclick="openInNewTab()" class="text-mocha-300 hover:text-white transition flex items-center px-2.5 py-1.5 md:px-4 md:py-2 rounded-lg bg-mocha-800/50 hover:bg-mocha-700" title="在全新分頁獨立開啟">
                    <i class="fa-solid fa-arrow-up-right-from-square text-sm md:text-base md:mr-2"></i>
                    <span class="hidden md:inline text-base font-bold">外帶視窗</span>
                </button>
                <button onclick="toggleFullScreen()" class="text-mocha-300 hover:text-white transition flex items-center px-2.5 py-1.5 md:px-4 md:py-2 rounded-lg bg-mocha-800/50 hover:bg-mocha-700" title="全螢幕模式 (按 Esc 退出)">
                    <i class="fa-solid fa-expand text-sm md:text-base md:mr-2"></i>
                    <span class="hidden md:inline text-base font-bold">沉浸品嚐</span>
                </button>
                <div class="h-6 w-px bg-mocha-700 mx-1 md:mx-2"></div>
                <button onclick="closeModal('preview-modal')" class="text-mocha-400 hover:text-red-400 transition w-8 h-8 md:w-10 md:h-10 flex items-center justify-center rounded-full hover:bg-mocha-800">
                    <i class="fa-solid fa-times text-xl md:text-2xl"></i>
                </button>
            </div>
        </div>
        <div class="flex-1 bg-white relative rounded-t-2xl md:rounded-t-3xl mx-1 md:mx-3 shadow-2xl overflow-hidden border-t-4 border-mocha-600">
            <iframe id="preview-frame" class="w-full h-full border-0 bg-white" sandbox="allow-scripts allow-same-origin allow-forms allow-popups"></iframe>
        </div>
    </div>

    <!-- 基本設定 Modal -->

    <script>
        // ------------------ 設定區塊 ------------------ //
        const GAS_API_URL = "https://script.google.com/macros/s/AKfycbxT12tUyOPb8Bhj2dO_abB4596dydNpPNexrACPe44C_m91gkjBLrm6YhDZcirIQfQp/exec";
        const DEFAULT_FOLDER_ID = "155vRl7rDF-acfHXo0vbkDRt-ZQhQRNqO";
        const APP_PASSWORD = "300300"; // 網頁與GS同步更新的密碼
        
        let filesData = [];
        let currentCategory = 'all';
        let currentDeveloper = 'all'; 
        let currentPreviewId = null;

        const developerColors = [
            { inactive: 'bg-orange-100 text-orange-700 hover:bg-orange-200', active: 'bg-orange-500 text-white shadow-md' },
            { inactive: 'bg-emerald-100 text-emerald-700 hover:bg-emerald-200', active: 'bg-emerald-500 text-white shadow-md' },
            { inactive: 'bg-blue-100 text-blue-700 hover:bg-blue-200', active: 'bg-blue-500 text-white shadow-md' },
            { inactive: 'bg-rose-100 text-rose-700 hover:bg-rose-200', active: 'bg-rose-500 text-white shadow-md' },
            { inactive: 'bg-purple-100 text-purple-700 hover:bg-purple-200', active: 'bg-purple-500 text-white shadow-md' },
            { inactive: 'bg-amber-100 text-amber-700 hover:bg-amber-200', active: 'bg-amber-500 text-white shadow-md' },
            { inactive: 'bg-cyan-100 text-cyan-700 hover:bg-cyan-200', active: 'bg-cyan-500 text-white shadow-md' },
            { inactive: 'bg-pink-100 text-pink-700 hover:bg-pink-200', active: 'bg-pink-500 text-white shadow-md' }
        ];

        // ------------------ 門禁系統邏輯 ------------------ //
        window.onload = () => {
            const params = new URLSearchParams(window.location.search);
            const urlPwd = params.get('pwd');

            // 如果 URL 中有帶正確的密碼 (手機掃碼帶入的情況)
            if (urlPwd === APP_PASSWORD) {
                localStorage.setItem('coffee_auth', APP_PASSWORD);
                
                // 為了美觀，將網址上的 pwd 參數清掉，但保留如果有 id 的參數
                const base = window.location.href.split('?')[0];
                const autoIdParams = params.get('id') ? `?id=${params.get('id')}` : '';
                window.history.replaceState(null, '', base + autoIdParams);
                
                initializeApp();
            } 
            // 檢查手機/瀏覽器是否已經記憶過密碼
            else if (localStorage.getItem('coffee_auth') === APP_PASSWORD) {
                initializeApp();
            } else {
                // 如果沒有記憶，就顯示門禁遮罩
                document.getElementById('auth-overlay').classList.remove('hidden');
                document.getElementById('auth-overlay').classList.add('flex');

                // 自動產生 QR Code (不含密碼，僅為網址)
                const currentUrl = window.location.href.split('?')[0];
                const autoIdParams = params.get('id') ? `?id=${params.get('id')}` : '';
                const qrUrl = `${currentUrl}${autoIdParams}`;
                const qrImgSrc = `https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=${encodeURIComponent(qrUrl)}&color=703a2c&bgcolor=ffffff`;
                document.getElementById('auth-qr-image').src = qrImgSrc;
            }
        };

        function verifyPassword() {
            const pwd = document.getElementById('auth-password').value;
            if (pwd === APP_PASSWORD) {
                loginSuccess();
            } else {
                showToast('密碼不正確', 'error');
            }
        }

        function loginSuccess() {
            // 將密碼記憶在手機中
            localStorage.setItem('coffee_auth', APP_PASSWORD);
            document.getElementById('auth-overlay').style.display = 'none';
            
            showToast('認證成功，歡迎回來！', 'success');
            initializeApp();
        }

        function logoutApp() {
            localStorage.removeItem('coffee_auth');
            location.reload();
        }

        // ------------------ 原有主程式初始化 ------------------ //
        function initializeApp() {
            setupAutoFilenamePreview();
            
            const params = new URLSearchParams(window.location.search);
            const autoId = params.get('id');
            
            if (autoId) {
                showLoader('光速為您端上專屬特調...');
                fetch(`${GAS_API_URL}?action=getFile&fileId=${autoId}`)
                    .then(res => res.json())
                    .then(response => {
                        if (response.success) {
                            document.open();
                            document.write(response.content);
                            document.close();
                            if(response.name) document.title = response.name.replace('.html', '');
                        } else {
                            showToast('特調已售完或不存在，為您開啟總菜單', 'error');
                            syncDrive();
                        }
                    })
                    .catch(error => {
                        showToast('網路異常，為您返回櫃台', 'error');
                        syncDrive();
                    });
            } else {
                syncDrive();
            }
        }

        function getTodayString() {
            const d = new Date();
            return `${d.getFullYear()}-${d.getMonth()+1}-${d.getDate()}`;
        }

        function switchMobileTab(tab) {
            document.body.setAttribute('data-mobile-tab', tab);
            document.querySelectorAll('.mobile-tab-btn').forEach(btn => {
                btn.classList.remove('text-sage-600', 'font-bold');
                btn.classList.add('text-mocha-400', 'font-medium');
            });
            const activeBtn = document.getElementById(`tab-btn-${tab}`);
            if(activeBtn) {
                activeBtn.classList.remove('text-mocha-400', 'font-medium');
                activeBtn.classList.add('text-sage-600', 'font-bold');
            }
        }

        function getFolderId() {
            return localStorage.getItem('htmlManager_folderId') || DEFAULT_FOLDER_ID;
        }

        function openSettings() {
            // 已通過外層大門，此處設定作為第二層防護
            const pwd = prompt("進入經理室需要密碼：");
            if (pwd === APP_PASSWORD) {
                document.getElementById('setting-folder-id').value = getFolderId();
                document.getElementById('settings-modal').classList.remove('hidden');
                document.getElementById('settings-modal').classList.add('flex');
            } else if (pwd !== null) {
                showToast('密碼錯誤，無法進入', 'error');
            }
        }

        function saveSettings() {
            const newId = document.getElementById('setting-folder-id').value.trim();
            if(newId) {
                localStorage.setItem('htmlManager_folderId', newId);
                closeModal('settings-modal');
                showToast('設定已更新，重新準備菜單...', 'success');
                syncDrive();
            }
        }

        function getSafeTag(type) {
            const chars = { lt: String.fromCharCode(60), gt: String.fromCharCode(62) };
            if(type === 'lt') return chars.lt;
            if(type === 'gt') return chars.gt;
            if(type === 'hEnd') return chars.lt + '/head' + chars.gt; 
            if(type === 'hStart') return chars.lt + 'html' + chars.gt;   
            if(type === 'hdStart') return chars.lt + 'head' + chars.gt;   
            return '';
        }

        function extractDescription(htmlContent) {
            const tag = getSafeTag('lt') + 'meta name="app-description" content="([^"]*?)"' + getSafeTag('gt');
            const regex = new RegExp(tag, 'i');
            const match = htmlContent.match(regex);
            return match ? match[1] : "";
        }

        function injectDescription(htmlContent, description) {
            const cleanPattern = getSafeTag('lt') + 'meta\\s+name=["\']app-description["\']\\s+content=["\'].*?["\']\\s*\\/?' + getSafeTag('gt') + '\\n?';
            let cleanHtml = htmlContent.replace(new RegExp(cleanPattern, 'gi'), '');
            if(!description.trim()) return cleanHtml;

            const metaTag = getSafeTag('lt') + 'meta name="app-description" content="' + description + '"' + getSafeTag('gt') + '\n';
            if (cleanHtml.includes(getSafeTag('hEnd'))) {
                return cleanHtml.replace(getSafeTag('hEnd'), metaTag + getSafeTag('hEnd'));
            } else if (cleanHtml.includes(getSafeTag('hStart'))) {
                return cleanHtml.replace(getSafeTag('hStart'), getSafeTag('hStart') + '\n' + getSafeTag('hdStart') + '\n' + metaTag + getSafeTag('hEnd'));
            } else {
                return metaTag + cleanHtml; 
            }
        }

        function extractRatings(htmlContent) {
            const tag = getSafeTag('lt') + 'meta name="app-rating" content=[' + "'\"" + '](.*?)[' + "'\"" + ']' + getSafeTag('gt');
            const regex = new RegExp(tag, 'i');
            const match = htmlContent.match(regex);
            if (match && match[1]) {
                try { return JSON.parse(match[1]); } catch(e) {}
            }
            return [];
        }

        function injectRatings(htmlContent, ratingsArray) {
            const cleanPattern = getSafeTag('lt') + 'meta\\s+name=["\']app-rating["\']\\s+content=["\'].*?["\']\\s*\\/?' + getSafeTag('gt') + '\\n?';
            let cleanHtml = htmlContent.replace(new RegExp(cleanPattern, 'gi'), '');
            if(!ratingsArray || ratingsArray.length === 0) return cleanHtml;

            const metaTag = getSafeTag('lt') + "meta name=\"app-rating\" content='" + JSON.stringify(ratingsArray) + "'" + getSafeTag('gt') + '\n';
            if (cleanHtml.includes(getSafeTag('hEnd'))) {
                return cleanHtml.replace(getSafeTag('hEnd'), metaTag + getSafeTag('hEnd'));
            } else if (cleanHtml.includes(getSafeTag('hStart'))) {
                return cleanHtml.replace(getSafeTag('hStart'), getSafeTag('hStart') + '\n' + getSafeTag('hdStart') + '\n' + metaTag + getSafeTag('hEnd'));
            } else {
                return metaTag + cleanHtml; 
            }
        }

        function extractDownloads(htmlContent) {
            const tag = getSafeTag('lt') + 'meta name="app-downloads" content="(\\d+)"' + getSafeTag('gt');
            const regex = new RegExp(tag, 'i');
            const match = htmlContent.match(regex);
            return match ? parseInt(match[1], 10) : 0;
        }

        function injectDownloads(htmlContent, count) {
            const cleanPattern = getSafeTag('lt') + 'meta\\s+name=["\']app-downloads["\']\\s+content=["\']\\d+["\']\\s*\\/?' + getSafeTag('gt') + '\\n?';
            let cleanHtml = htmlContent.replace(new RegExp(cleanPattern, 'gi'), '');

            const metaTag = getSafeTag('lt') + 'meta name="app-downloads" content="' + count + '"' + getSafeTag('gt') + '\n';
            if (cleanHtml.includes(getSafeTag('hEnd'))) {
                return cleanHtml.replace(getSafeTag('hEnd'), metaTag + getSafeTag('hEnd'));
            } else if (cleanHtml.includes(getSafeTag('hStart'))) {
                return cleanHtml.replace(getSafeTag('hStart'), getSafeTag('hStart') + '\n' + getSafeTag('hdStart') + '\n' + metaTag + getSafeTag('hEnd'));
            } else {
                return metaTag + cleanHtml; 
            }
        }

        function extractDevice(htmlContent) {
            const tag = getSafeTag('lt') + 'meta name="app-device" content="([^"]*?)"' + getSafeTag('gt');
            const regex = new RegExp(tag, 'i');
            const match = htmlContent.match(regex);
            return match ? match[1] : "均可";
        }

        function injectDevice(htmlContent, device) {
            const cleanPattern = getSafeTag('lt') + 'meta\\s+name=["\']app-device["\']\\s+content=["\'].*?["\']\\s*\\/?' + getSafeTag('gt') + '\\n?';
            let cleanHtml = htmlContent.replace(new RegExp(cleanPattern, 'gi'), '');

            const metaTag = getSafeTag('lt') + 'meta name="app-device" content="' + device + '"' + getSafeTag('gt') + '\n';
            if (cleanHtml.includes(getSafeTag('hEnd'))) {
                return cleanHtml.replace(getSafeTag('hEnd'), metaTag + getSafeTag('hEnd'));
            } else if (cleanHtml.includes(getSafeTag('hStart'))) {
                return cleanHtml.replace(getSafeTag('hStart'), getSafeTag('hStart') + '\n' + getSafeTag('hdStart') + '\n' + metaTag + getSafeTag('hEnd'));
            } else {
                return metaTag + cleanHtml; 
            }
        }

        function syncDrive() {
            const folderId = getFolderId();
            showLoader('咖啡師為您準備菜單中...');

            fetch(`${GAS_API_URL}?action=getFiles&folderId=${folderId}`)
                .then(res => res.json())
                .then(response => {
                    hideLoader();
                    if (response.success) {
                        filesData = response.data;
                        renderApp();
                        showToast(`今日為您準備了 ${filesData.length} 杯特調`, 'success');
                    } else {
                        showToast('讀取菜單失敗：' + response.error, 'error');
                    }
                })
                .catch(error => {
                    hideLoader();
                    console.error('Fetch 錯誤:', error);
                    showToast('網路連線異常，無法讀取吧台', 'error');
                });
        }

        function saveFile() {
            const form = document.getElementById('file-form');
            if (!form.checkValidity()) return form.reportValidity();

            const rawContent = document.getElementById('file-content').value;
            const description = document.getElementById('file-description').value;
            const device = document.getElementById('file-device').value;
            
            const fileId = document.getElementById('file-id').value;
            let existingRatings = [];
            let existingDownloads = 0; 
            if(fileId) {
                const existingFile = filesData.find(f => f.id === fileId);
                if(existingFile) {
                    existingRatings = extractRatings(existingFile.content);
                    existingDownloads = extractDownloads(existingFile.content);
                }
            }

            let finalContent = injectDescription(rawContent, description);
            finalContent = injectRatings(finalContent, existingRatings);
            finalContent = injectDownloads(finalContent, existingDownloads);
            finalContent = injectDevice(finalContent, device); 

            const payload = {
                action: 'saveFile',
                folderId: getFolderId(),
                fileId: fileId,
                category: document.getElementById('file-category').value.trim(),
                name: document.getElementById('file-name').value.trim(),
                developer: document.getElementById('file-developer').value.trim(),
                content: finalContent
            };

            showLoader('正在為您調製並放入冷藏備份...');
            document.getElementById('save-btn').disabled = true;

            fetch(GAS_API_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                body: JSON.stringify(payload)
            })
            .then(res => res.json())
            .then(response => {
                hideLoader();
                document.getElementById('save-btn').disabled = false;
                if (response.success) {
                    closeModal('file-modal');
                    showToast('特調已成功上架！', 'success');
                    syncDrive();
                    if(window.innerWidth < 768) switchMobileTab('files');
                } else {
                    showToast('上架失敗：' + response.error, 'error');
                }
            })
            .catch(error => {
                hideLoader();
                document.getElementById('save-btn').disabled = false;
                showToast('系統異常，無法上架', 'error');
            });
        }

        function rateFile(id, score) {
            const file = filesData.find(f => f.id === id);
            if(!file) return;

            const todayStr = getTodayString();
            if(localStorage.getItem('rated_date_' + id) === todayStr) {
                showToast('您今天已經評分過囉！請明天再來。', 'error');
                return;
            }

            showLoader('遞送您的評價給咖啡師...');
            
            let ratings = extractRatings(file.content);
            ratings.push(score);
            file.content = injectRatings(file.content, ratings);
            
            localStorage.setItem('rated_date_' + id, todayStr);

            const payload = {
                action: 'saveFile',
                folderId: getFolderId(),
                fileId: file.id,
                category: file.category,
                name: file.name,
                developer: file.developer,
                content: file.content
            };

            fetch(GAS_API_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                body: JSON.stringify(payload)
            })
            .then(res => res.json())
            .then(response => {
                hideLoader();
                if (response.success) {
                    showToast('感謝您給予的好評！', 'success');
                    renderFiles();
                } else {
                    showToast('評價遞送失敗', 'error');
                    localStorage.removeItem('rated_date_' + id);
                }
            })
            .catch(error => {
                hideLoader();
                showToast('網路異常，評價失敗', 'error');
                localStorage.removeItem('rated_date_' + id);
            });
        }

        function deleteFile(id, fileName) {
            document.getElementById('delete-modal-message').innerHTML = `您確定要把 <span class="font-bold text-red-600">「${fileName}」</span> 倒掉嗎？<br>請放心，這個動作不會刪除「備份冷藏庫」裡的檔案。`;
            document.getElementById('delete-file-id').value = id;
            document.getElementById('delete-password').value = ''; 
            
            document.getElementById('delete-modal').classList.remove('hidden');
            document.getElementById('delete-modal').classList.add('flex');
        }

        function confirmDeleteAction() {
            const pwd = document.getElementById('delete-password').value;
            // 套用新密碼作為防呆
            if (pwd !== APP_PASSWORD) {
                showToast('密碼不正確', 'error');
                return;
            }

            const id = document.getElementById('delete-file-id').value;
            closeModal('delete-modal');
            showLoader('正在清理吧台核對權限...');

            fetch(GAS_API_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                body: JSON.stringify({ action: 'deleteFile', fileId: id })
            })
            .then(res => res.json())
            .then(response => {
                hideLoader();
                if (response.success) {
                    showToast('吧台清理完畢', 'success');
                    syncDrive();
                } else {
                    showToast('清理失敗：' + response.error, 'error');
                }
            })
            .catch(error => {
                hideLoader();
                showToast('系統異常，無法清理', 'error');
            });
        }

        function downloadFile(id) {
            const file = filesData.find(f => f.id === id);
            if(!file) return;

            const filename = `${file.category}-${file.name}-${file.developer}.html`;
            const blob = new Blob([file.content], { type: "text/html;charset=utf-8" });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = filename;
            a.click();
            URL.revokeObjectURL(url);
            showToast(`已為您打包好：${filename}`, 'success');

            let currentDownloads = extractDownloads(file.content);
            currentDownloads++;
            file.content = injectDownloads(file.content, currentDownloads);
            
            renderFiles();

            const payload = {
                action: 'saveFile',
                folderId: getFolderId(),
                fileId: file.id,
                category: file.category,
                name: file.name,
                developer: file.developer,
                content: file.content
            };

            fetch(GAS_API_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                body: JSON.stringify(payload)
            }).catch(e => console.error('下載數同步失敗', e));
        }

        function createShortcut(id, name) {
            const baseUrl = window.location.href.split('?')[0];
            const targetUrl = `${baseUrl}?id=${id}`;
            
            const htmlContent = `<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="refresh" content="0; url=${targetUrl}">
    <title>正在開啟 ${name}...</title>
</head>
<body style="background-color: #fdfbf7; font-family: sans-serif; text-align: center; padding-top: 20vh;">
    <h2 style="color: #703a2c;">正在為您開啟「${name}」...</h2>
    <p style="color: #a35a39; margin-top: 10px;">若沒有自動跳轉，請 <a href="${targetUrl}" style="color: #38bdf8;">點擊這裡</a>。</p>
    <script>window.location.href = "${targetUrl}";<\/script>
</body>
</html>`;
            
            const blob = new Blob([htmlContent], { type: "text/html;charset=utf-8" });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `${name}_桌面捷徑.html`;
            a.click();
            URL.revokeObjectURL(url);
            
            showToast('桌面捷徑已下載！請將它拖曳到桌面使用', 'success');
        }

        function copyShortcut(id) {
            const baseUrl = window.location.href.split('?')[0];
            const shortcutUrl = `${baseUrl}?id=${id}`;
            const tempInput = document.createElement('input');
            tempInput.value = shortcutUrl;
            document.body.appendChild(tempInput);
            tempInput.select();
            document.execCommand('copy');
            document.body.removeChild(tempInput);
            showToast('專屬外送連結已複製！', 'success');
        }

        function downloadAllZip() {
            if (filesData.length === 0) {
                showToast('菜單目前是空的', 'error');
                return;
            }
            
            showLoader('正在為您打包全品項外帶...');
            const zip = new JSZip();
            
            filesData.forEach(file => {
                const filename = `${file.category}-${file.name}-${file.developer}.html`;
                zip.file(filename, file.content);
            });

            zip.generateAsync({ type: "blob" }).then(function(content) {
                hideLoader();
                const url = URL.createObjectURL(content);
                const a = document.createElement('a');
                a.href = url;
                a.download = "鳳甲AI咖啡館_全品項外帶.zip";
                a.click();
                URL.revokeObjectURL(url);
                showToast('外帶餐盒已為您準備好', 'success');
            });
        }

        function renderApp() {
            renderCategories();
            renderDeveloperTabs();
            renderFiles();
        }

        function renderCategories() {
            const list = document.getElementById('category-list');
            const categories = ['all', ...new Set(filesData.map(f => f.category))];
            list.innerHTML = '';
            
            categories.forEach(cat => {
                const isSelected = currentCategory === cat;
                const title = cat === 'all' ? '本店全品項' : cat;
                const count = cat === 'all' ? filesData.length : filesData.filter(f => f.category === cat).length;
                
                const btn = document.createElement('button');
                btn.className = `w-full text-left px-5 py-4 rounded-2xl mb-2 flex items-center justify-between transition duration-200 group ${isSelected ? 'bg-mocha-600 text-white font-bold shadow-md' : 'text-mocha-600 hover:bg-mocha-100 font-bold border border-transparent hover:border-mocha-200'}`;
                btn.onclick = () => {
                    currentCategory = cat;
                    currentDeveloper = 'all'; 
                    document.getElementById('current-category-title').innerText = title;
                    renderApp();
                    if(window.innerWidth < 768) {
                        switchMobileTab('files');
                    }
                };
                
                const iconColor = isSelected ? 'text-mocha-200' : 'text-mocha-400 group-hover:text-mocha-600';
                const badgeClass = isSelected ? 'bg-mocha-500 text-white border border-mocha-400' : 'bg-mocha-100 text-mocha-600 border border-mocha-200';
                const icon = cat === 'all' ? 'fa-mug-hot' : 'fa-tag';

                btn.innerHTML = `<span class="text-base md:text-lg flex items-center"><i class="fa-solid ${icon} w-7 text-center mr-2 ${iconColor} transition-transform group-hover:-rotate-6 text-lg md:text-xl"></i>${title}</span>
                                 <span class="text-xs md:text-sm ${badgeClass} py-0.5 px-3 rounded-full font-bold">${count}</span>`;
                list.appendChild(btn);
            });
        }

        function renderDeveloperTabs() {
            const container = document.getElementById('developer-tabs-container');
            container.innerHTML = '';

            const categoryFiles = currentCategory === 'all' ? filesData : filesData.filter(f => f.category === currentCategory);
            const developers = [...new Set(categoryFiles.map(f => f.developer))].filter(d => d).sort();

            if(developers.length === 0) {
                container.style.display = 'none';
                return;
            }
            container.style.display = 'flex';

            const allBtn = document.createElement('button');
            const isAllSelected = currentDeveloper === 'all';
            allBtn.className = `whitespace-nowrap px-4 py-1.5 md:py-2 rounded-full font-bold text-sm md:text-base transition-all duration-300 flex-shrink-0 ${isAllSelected ? 'bg-mocha-800 text-white shadow-md' : 'bg-mocha-100 text-mocha-600 hover:bg-mocha-200'}`;
            allBtn.innerText = '全部咖啡師';
            allBtn.onclick = () => {
                currentDeveloper = 'all';
                renderDeveloperTabs();
                renderFiles();
            };
            container.appendChild(allBtn);

            developers.forEach((dev, index) => {
                const isSelected = currentDeveloper === dev;
                const colors = developerColors[index % developerColors.length];
                const btn = document.createElement('button');
                
                btn.className = `whitespace-nowrap px-4 py-1.5 md:py-2 rounded-full font-bold text-sm md:text-base transition-all duration-300 flex-shrink-0 flex items-center ${isSelected ? colors.active : colors.inactive}`;
                btn.innerHTML = `<i class="fa-solid fa-user-astronaut mr-1.5 opacity-80"></i>${dev}`;
                btn.onclick = () => {
                    currentDeveloper = dev;
                    renderDeveloperTabs();
                    renderFiles();
                };
                container.appendChild(btn);
            });
        }

        function renderFiles() {
            const container = document.getElementById('files-container');
            
            let files = currentCategory === 'all' ? filesData : filesData.filter(f => f.category === currentCategory);
            if (currentDeveloper !== 'all') {
                files = files.filter(f => f.developer === currentDeveloper);
            }

            document.getElementById('file-count').innerText = `為您準備了 ${files.length} 款特調`;
            container.innerHTML = '';

            if(files.length === 0) {
                container.innerHTML = `
                    <div class="col-span-full py-20 md:py-32 flex flex-col items-center justify-center text-mocha-300 relative">
                        <i class="fa-solid fa-mug-empty text-[5rem] md:text-[6rem] mb-6 opacity-40 float-anim"></i>
                        <p class="text-xl md:text-2xl font-bold tracking-wide text-center">這位咖啡師目前沒有此特調<br>請選擇其他人看看吧！</p>
                    </div>`;
                return;
            }

            files.forEach(file => {
                const fName = `${file.category}-${file.name}-${file.developer}.html`;
                const desc = extractDescription(file.content) || "咖啡師還沒寫下這杯特調的故事...";
                const ratings = extractRatings(file.content);
                const downloads = extractDownloads(file.content); 
                const device = extractDevice(file.content) || "均可"; 

                let deviceIconHtml = '';
                if (device === '手機') {
                    deviceIconHtml = '<i class="fa-solid fa-mobile-screen-button mr-1.5"></i>手機';
                } else if (device === '大螢幕') {
                    deviceIconHtml = '<i class="fa-solid fa-desktop mr-1.5"></i>大螢幕';
                } else {
                    deviceIconHtml = '<i class="fa-solid fa-mobile-screen-button mr-1"></i><i class="fa-solid fa-desktop mr-1.5"></i>均可';
                }

                const card = document.createElement('div');
                card.className = 'bg-white rounded-[2rem] shadow-[0_4px_20px_rgba(136,70,50,0.05)] hover:shadow-[0_10px_30px_rgba(136,70,50,0.12)] border border-mocha-100/50 transition-all duration-300 p-6 md:p-8 flex flex-col group relative overflow-hidden';
                
                const watermark = document.createElement('i');
                watermark.className = 'fa-solid fa-mug-saucer absolute -right-6 -bottom-6 md:-right-8 md:-bottom-8 text-[10rem] md:text-[14rem] text-mocha-50 opacity-40 group-hover:opacity-60 group-hover:-rotate-12 transition-all duration-500 z-0 pointer-events-none';
                card.appendChild(watermark);

                let avg = 0;
                if (ratings.length > 0) {
                    avg = ratings.reduce((a,b) => a+b, 0) / ratings.length;
                }
                const displayAvg = ratings.length > 0 ? avg.toFixed(1) : '-.-';

                const todayStr = getTodayString();
                const hasRated = localStorage.getItem('rated_date_' + file.id) === todayStr;
                let interactiveRatingHtml = '';
                
                if (hasRated) {
                    interactiveRatingHtml = `
                        <div class="flex items-center justify-center bg-sage-50/70 py-2.5 px-4 rounded-xl border border-sage-200 mb-5 relative z-10">
                            <span class="text-sm font-bold text-sage-700 tracking-wide"><i class="fa-solid fa-check-circle mr-1.5"></i>您的好評已送出，明天見！</span>
                        </div>
                    `;
                } else {
                    let stars = '';
                    for(let i=1; i<=5; i++) {
                        stars += `<i class="fa-regular fa-star text-mocha-200 cursor-pointer hover:text-mocha-500 hover:scale-125 transition-all duration-200 px-1" onclick="rateFile('${file.id}', ${i})" title="給予 ${i} 顆星"></i>`;
                    }
                    interactiveRatingHtml = `
                        <div class="flex flex-col items-center justify-center bg-[#fdfbf7] p-3 rounded-2xl border border-mocha-200/60 shadow-inner mb-5 relative z-10">
                            <span class="text-xs font-bold text-mocha-400 mb-1">為這杯特調打分數</span>
                            <div class="flex text-2xl text-mocha-400">${stars}</div>
                        </div>
                    `;
                }

                card.innerHTML += `
                    <div class="relative z-10 flex flex-col h-full">
                        <div class="absolute -top-2 -right-2 opacity-100 md:opacity-0 group-hover:opacity-100 transition-opacity flex flex-col gap-1.5 z-20">
                            <button onclick="copyShortcut('${file.id}')" class="w-10 h-10 bg-white/90 backdrop-blur border border-mocha-100 shadow-sm flex items-center justify-center rounded-full text-mocha-400 hover:text-blue-600 hover:border-blue-200 transition flex-shrink-0" title="複製外送連結"><i class="fa-solid fa-link text-sm md:text-base"></i></button>
                            <button onclick="createShortcut('${file.id}', '${file.name}')" class="w-10 h-10 bg-white/90 backdrop-blur border border-mocha-100 shadow-sm flex items-center justify-center rounded-full text-mocha-400 hover:text-purple-600 hover:border-purple-200 transition flex-shrink-0" title="下載桌面捷徑"><i class="fa-solid fa-desktop text-sm md:text-base"></i></button>
                            <button onclick="downloadFile('${file.id}')" class="w-10 h-10 bg-white/90 backdrop-blur border border-mocha-100 shadow-sm flex items-center justify-center rounded-full text-mocha-400 hover:text-sage-600 hover:border-sage-200 transition flex-shrink-0" title="打包下載"><i class="fa-solid fa-download text-sm md:text-base"></i></button>
                            <button onclick="openModal('edit', '${file.id}')" class="w-10 h-10 bg-white/90 backdrop-blur border border-mocha-100 shadow-sm flex items-center justify-center rounded-full text-mocha-400 hover:text-mocha-700 hover:border-mocha-300 transition flex-shrink-0" title="修改配方"><i class="fa-solid fa-pen text-sm md:text-base"></i></button>
                            <button onclick="deleteFile('${file.id}', '${fName}')" class="w-10 h-10 bg-white/90 backdrop-blur border border-mocha-100 shadow-sm flex items-center justify-center rounded-full text-mocha-400 hover:text-red-500 hover:border-red-200 transition flex-shrink-0" title="倒掉"><i class="fa-solid fa-trash text-sm md:text-base"></i></button>
                        </div>

                        <div class="flex flex-wrap items-center gap-2 mb-4 pr-[45px] md:pr-12 overflow-hidden">
                            <div class="inline-flex items-center text-xs font-bold tracking-wider px-3 py-1 bg-mocha-600 text-white rounded-full shadow-sm flex-shrink-0 whitespace-nowrap">
                                <i class="fa-solid fa-tag mr-1.5 opacity-80"></i>${file.category}
                            </div>
                            <div class="inline-flex items-center text-xs font-bold tracking-wider px-3 py-1 bg-yellow-50 text-yellow-700 rounded-full border border-yellow-200 flex-shrink-0 whitespace-nowrap">
                                <i class="fa-solid fa-star text-yellow-500 mr-1"></i>${displayAvg} <span class="opacity-60 ml-1 font-normal">(${ratings.length})</span>
                            </div>
                            <div class="inline-flex items-center text-xs font-bold tracking-wider px-3 py-1 bg-cyan-50 text-cyan-700 rounded-full border border-cyan-200 flex-shrink-0 whitespace-nowrap">
                                <i class="fa-solid fa-cloud-arrow-down mr-1.5 opacity-80"></i>${downloads} 次
                            </div>
                            <div class="inline-flex items-center text-xs font-bold tracking-wider px-3 py-1 bg-purple-50 text-purple-700 rounded-full border border-purple-200 flex-shrink-0 whitespace-nowrap">
                                ${deviceIconHtml}
                            </div>
                        </div>
                        
                        <h3 class="text-2xl font-black text-mocha-900 mb-2 line-clamp-2 leading-tight" title="${file.name}">${file.name}</h3>
                        
                        <p class="text-sm text-mocha-500 mb-5 font-bold flex items-center bg-mocha-50 w-max px-3 py-1 rounded-lg border border-mocha-100">
                            <i class="fa-solid fa-user-tie text-mocha-400 mr-2 text-base"></i> 咖啡師：${file.developer}
                        </p>
                        
                        <div class="mb-6 flex-1 overflow-y-auto h-20 pr-2 tasting-note pl-4">
                            <span class="block text-xs font-bold tracking-widest text-mocha-400 uppercase mb-1">Tasting Notes</span>
                            <p class="text-sm md:text-base text-mocha-700 leading-relaxed whitespace-pre-wrap">${desc}</p>
                        </div>

                        ${interactiveRatingHtml}

                        <button onclick="runFile('${file.id}')" class="mt-auto w-full bg-mocha-800 text-white font-bold text-lg py-3.5 rounded-2xl hover:bg-mocha-900 transition-colors duration-300 flex items-center justify-center shadow-[0_4px_15px_rgba(112,58,44,0.3)] group/btn relative overflow-hidden">
                            <div class="absolute inset-0 bg-white/20 translate-y-full group-hover/btn:translate-y-0 transition-transform duration-300"></div>
                            <i class="fa-solid fa-mug-hot mr-2.5 group-hover/btn:animate-bounce relative z-10"></i> 
                            <span class="relative z-10 tracking-wide">☕ 端上特調</span>
                        </button>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        function setupAutoFilenamePreview() {
            const updatePreview = () => {
                const c = document.getElementById('file-category').value.trim() || '類別';
                const n = document.getElementById('file-name').value.trim() || '網頁名稱';
                const d = document.getElementById('file-developer').value.trim() || '開發者';
                document.getElementById('preview-filename').innerText = `${c}-${n}-${d}.html`;
            };
            ['file-category', 'file-name', 'file-developer'].forEach(id => {
                document.getElementById(id).addEventListener('input', updatePreview);
            });
        }

        function openModal(mode, id = null) {
            const modal = document.getElementById('file-modal');
            document.getElementById('file-form').reset();
            
            if (mode === 'add') {
                document.getElementById('modal-title').innerText = '研發新特調';
                document.getElementById('file-id').value = '';
                document.getElementById('preview-filename').innerText = '類別-網頁名稱-開發者.html';
                document.getElementById('file-description').value = '';
                document.getElementById('file-device').value = '均可';
            } else if (mode === 'edit' && id) {
                document.getElementById('modal-title').innerText = '修改特調配方';
                const file = filesData.find(f => f.id === id);
                if (file) {
                    document.getElementById('file-id').value = file.id;
                    document.getElementById('file-category').value = file.category;
                    document.getElementById('file-name').value = file.name;
                    document.getElementById('file-developer').value = file.developer;
                    document.getElementById('file-content').value = file.content;
                    document.getElementById('file-description').value = extractDescription(file.content);
                    document.getElementById('file-device').value = extractDevice(file.content) || '均可';
                    document.getElementById('preview-filename').innerText = `${file.category}-${file.name}-${file.developer}.html`;
                }
            }
            modal.classList.remove('hidden');
            modal.classList.add('flex');
        }

        function closeModal(id) {
            document.getElementById(id).classList.add('hidden');
            document.getElementById(id).classList.remove('flex');
            
            if(id === 'preview-modal') {
                document.getElementById('preview-frame').srcdoc = '';
                currentPreviewId = null;
                if (document.fullscreenElement) document.exitFullscreen();
            }
        }

        function runFile(id) {
            const file = filesData.find(f => f.id === id);
            if (!file) return;
            currentPreviewId = id;
            
            document.getElementById('preview-title').innerText = `${file.category} - ${file.name}`;
            document.getElementById('preview-frame').srcdoc = file.content;
            document.getElementById('preview-modal').classList.remove('hidden');
            document.getElementById('preview-modal').classList.add('flex');
        }

        function toggleFullScreen() {
            const iframe = document.getElementById('preview-frame');
            if (!document.fullscreenElement) {
                if (iframe.requestFullscreen) iframe.requestFullscreen();
                else if (iframe.webkitRequestFullscreen) iframe.webkitRequestFullscreen();
                else if (iframe.msRequestFullscreen) iframe.msRequestFullscreen();
            } else {
                if (document.exitFullscreen) document.exitFullscreen();
            }
        }

        function openInNewTab() {
            if (!currentPreviewId) return;
            const file = filesData.find(f => f.id === currentPreviewId);
            if (!file) return;

            const newWin = window.open('', '_blank');
            if (newWin) {
                newWin.document.open();
                newWin.document.write(file.content);
                newWin.document.close();
                newWin.document.title = `${file.category}-${file.name}-${file.developer}.html`;
            } else {
                showToast('請允許瀏覽器彈出視窗以開啟外帶包', 'error');
            }
        }

        function showLoader(text) {
            document.getElementById('loader-text').innerText = text;
            document.body.classList.add('loading');
        }

        function hideLoader() {
            document.body.classList.remove('loading');
        }

        function showToast(msg, type = 'success') {
            const toast = document.getElementById('toast');
            const icon = document.getElementById('toast-icon');
            const text = document.getElementById('toast-message');
            
            text.innerText = msg;
            toast.className = `fixed bottom-[90px] md:bottom-10 left-1/2 transform -translate-x-1/2 transition-all duration-300 px-6 py-3 md:px-8 md:py-4 rounded-full shadow-[0_8px_30px_rgba(0,0,0,0.2)] z-[100] flex items-center space-x-3 md:space-x-4 text-white w-max max-w-[90vw]`;
            
            if(type === 'success') {
                toast.classList.add('bg-mocha-700');
                icon.className = 'fa-solid fa-mug-hot text-base md:text-lg bg-white/20 p-2 rounded-full flex-shrink-0';
            } else {
                toast.classList.add('bg-red-800');
                icon.className = 'fa-solid fa-triangle-exclamation text-base md:text-lg bg-white/20 p-2 rounded-full px-3 flex-shrink-0';
            }
            
            toast.classList.remove('translate-y-32', 'opacity-0');
            setTimeout(() => toast.classList.add('translate-y-32', 'opacity-0'), 3000);
        }
    </script>
</body>
</html>
